# This workflow will install Python dependencies and run the temporary proxy server
name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Configure System SSH Engine
      run: |
        sudo apt-get update
        sudo apt-get install -y openssh-server
        
        # Force create the user 'Praxis16' with home directory to prevent SSH rejection
        sudo useradd -m -s /bin/bash Praxis16
        
        # Hard-force password assignment via standard chpasswd tool bypassing PAM checks
        echo "Praxis16:mysecurepassword123" | sudo chpasswd -e || echo "Praxis16:\$6\$lhr\$xZ0Yp5xV2r6U8v8Z9w8Q7x6y5z4u3i2o1p0qR": | sudo chpasswd -e
        
        # Override standard enterprise PAM blocks for password authentication
        sudo sed -i 's/UsePAM yes/UsePAM no/g' /etc/ssh/sshd_config
        sudo sed -i 's/#AllowTcpForwarding yes/AllowTcpForwarding yes/g' /etc/ssh/sshd_config
        sudo sed -i 's/#GatewayPorts no/GatewayPorts yes/g' /etc/ssh/sshd_config
        sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/g' /etc/ssh/sshd_config
        echo "PasswordAuthentication yes" | sudo tee -a /etc/ssh/sshd_config
        
        # Restart the daemon safely
        sudo systemctl restart ssh

    - name: Launch Tunnel Infrastructure
      run: |
        python ws.py &
        sleep 3
        echo "=========================================================="
        echo "=== YOUR TEMPORARY PUBLIC HOST ADDRESS WILL APPEAR BELOW ==="
        echo "=========================================================="
        ssh -o StrictHostKeyChecking=no -R 80:localhost:8080 nokey@localhost.run
